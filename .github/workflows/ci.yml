name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Web (Next.js) ────────────────────────────────────────
  web-lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --filter=web
      - run: pnpm typecheck --filter=web

  web-build:
    runs-on: ubuntu-latest
    needs: web-lint-typecheck
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=web

  # ── API (FastAPI) ────────────────────────────────────────
  api-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --package roof-corrosion-api --extra dev
      - run: uv run --package roof-corrosion-api ruff check services/api/
      - run: uv run --package roof-corrosion-api ruff format --check services/api/
      - run: uv run --package roof-corrosion-api mypy services/api/app/
      - run: uv run --package roof-corrosion-api pytest services/api/tests/ -v --cov=app --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./services/api/coverage.xml
          flags: api
          name: api-coverage

  # ── ML ────────────────────────────────────────────────────
  ml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --package roof-corrosion-ml --extra dev
      - run: uv run --package roof-corrosion-ml ruff check ml/
      - run: uv run --package roof-corrosion-ml ruff format --check ml/
      - run: uv run python ml/data/check_licenses.py

  # ── ML tests ────────────────────────────────────────────
  ml-test:
    runs-on: ubuntu-latest
    needs: ml-lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --package roof-corrosion-ml --extra dev
      - run: uv run --package roof-corrosion-ml pytest ml/tests/ -v --tb=short

  # ── Data license gate ────────────────────────────────────
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Check DATA_LICENSES.md is up to date
        run: uv run python ml/data/check_licenses.py
