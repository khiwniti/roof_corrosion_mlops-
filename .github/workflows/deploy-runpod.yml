name: Deploy to RunPod Serverless

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Which endpoint to deploy'
        type: choice
        options: [inference, training, both]
        default: inference
      tag:
        description: 'Docker image tag (default: git SHA)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  INFERENCE_IMAGE: ${{ vars.DOCKER_USERNAME || 'khiwniti' }}/roof-corrosion-inference
  TRAINING_IMAGE: ${{ vars.DOCKER_USERNAME || 'khiwniti' }}/roof-corrosion-training

jobs:
  # ── Build & push inference image ─────────────────────────
  build-inference:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'inference' ||
      github.event.inputs.target == 'both'
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      pushed: ${{ steps.creds.outputs.available }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        id: creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME / DOCKER_PASSWORD not set — image will be built but not pushed."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.INFERENCE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/runpod/serverless/inference/Dockerfile
          platforms: linux/amd64
          push: ${{ steps.creds.outputs.available == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push training image ───────────────────────────
  build-training:
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.target == 'training' ||
      github.event.inputs.target == 'both' ||
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      pushed: ${{ steps.creds.outputs.available }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        id: creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME / DOCKER_PASSWORD not set — image will be built but not pushed."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.TRAINING_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/runpod/serverless/training/Dockerfile
          platforms: linux/amd64
          push: ${{ steps.creds.outputs.available == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update RunPod inference endpoint ──────────────────────
  deploy-inference:
    runs-on: ubuntu-latest
    needs: build-inference
    if: >
      always() &&
      needs.build-inference.result == 'success' &&
      needs.build-inference.outputs.pushed == 'true' &&
      vars.RUNPOD_INFERENCE_ENDPOINT_ID != ''
    environment: production
    steps:
      - name: Update inference endpoint image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_INFERENCE_ENDPOINT_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.INFERENCE_IMAGE }}:sha-${{ github.sha }}
        run: |
          curl -sf -X PATCH \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\": \"${IMAGE}\"}"
          echo "Inference endpoint updated to: ${IMAGE}"

      - name: Smoke test inference endpoint
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_INFERENCE_ENDPOINT_ID }}
        run: |
          sleep 15
          STATUS=$(curl -sf \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            | python3 -c "import sys,json; e=json.load(sys.stdin); print(e.get('status','unknown'))")
          echo "Endpoint status: ${STATUS}"
          [ "${STATUS}" = "ready" ] || [ "${STATUS}" = "running" ]

  # ── Update RunPod training endpoint ───────────────────────
  deploy-training:
    runs-on: ubuntu-latest
    needs: build-training
    if: >
      always() &&
      needs.build-training.result == 'success' &&
      needs.build-training.outputs.pushed == 'true' &&
      vars.RUNPOD_TRAINING_ENDPOINT_ID != ''
    environment: production
    steps:
      - name: Update training endpoint image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_TRAINING_ENDPOINT_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.TRAINING_IMAGE }}:sha-${{ github.sha }}
        run: |
          curl -sf -X PATCH \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\": \"${IMAGE}\"}"
          echo "Training endpoint updated to: ${IMAGE}"
