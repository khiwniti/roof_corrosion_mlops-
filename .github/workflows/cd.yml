name: CD — Production Docker Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'infra/runpod/serverless/**'
      - 'ml/**'
      - '.github/workflows/cd.yml'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Which images to build'
        type: choice
        options: [all, inference, training, api]
        default: all
      push_images:
        description: 'Push images to registry'
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || 'khiwnitigetintheq' }}

jobs:
  # ── Build & push inference image ─────────────────────────────────────────
  build-inference:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'inference' ||
      github.event.inputs.target == 'all'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      pushed: ${{ steps.creds.outputs.available }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        id: creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME / DOCKER_PASSWORD not set — image built but not pushed."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/roof-corrosion-inference
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/runpod/serverless/inference/Dockerfile
          platforms: linux/amd64
          push: ${{ steps.creds.outputs.available == 'true' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ── Build & push training image ───────────────────────────────────────────
  build-training:
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.target == 'training' ||
      github.event.inputs.target == 'all' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'push'
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      pushed: ${{ steps.creds.outputs.available }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        id: creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/roof-corrosion-training
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/runpod/serverless/training/Dockerfile
          platforms: linux/amd64
          push: ${{ steps.creds.outputs.available == 'true' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & push API image ────────────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.target == 'api' ||
      github.event.inputs.target == 'all' ||
      github.event_name == 'push'
    permissions:
      contents: read
    outputs:
      pushed: ${{ steps.creds.outputs.available }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker credentials
        id: creds
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/roof-corrosion-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          file: ./services/api/Dockerfile.runpod
          platforms: linux/amd64
          push: ${{ steps.creds.outputs.available == 'true' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update RunPod inference endpoint ──────────────────────────────────────
  deploy-inference:
    runs-on: ubuntu-latest
    needs: build-inference
    if: >
      always() &&
      needs.build-inference.result == 'success' &&
      needs.build-inference.outputs.pushed == 'true' &&
      vars.RUNPOD_INFERENCE_ENDPOINT_ID != ''
    environment: production
    steps:
      - name: Update inference endpoint image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_INFERENCE_ENDPOINT_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/roof-corrosion-inference:sha-${{ github.sha }}
        run: |
          curl -sf -X PATCH \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\": \"${IMAGE}\"}"
          echo "Inference endpoint updated to: ${IMAGE}"

      - name: Smoke test inference endpoint
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_INFERENCE_ENDPOINT_ID }}
        run: |
          sleep 15
          STATUS=$(curl -sf \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            | python3 -c "import sys,json; e=json.load(sys.stdin); print(e.get('status','unknown'))")
          echo "Endpoint status: ${STATUS}"

  # ── Update RunPod training endpoint ───────────────────────────────────────
  deploy-training:
    runs-on: ubuntu-latest
    needs: build-training
    if: >
      always() &&
      needs.build-training.result == 'success' &&
      needs.build-training.outputs.pushed == 'true' &&
      vars.RUNPOD_TRAINING_ENDPOINT_ID != ''
    environment: production
    steps:
      - name: Update training endpoint image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_TRAINING_ENDPOINT_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.DOCKER_USERNAME }}/roof-corrosion-training:sha-${{ github.sha }}
        run: |
          curl -sf -X PATCH \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\": \"${IMAGE}\"}"
          echo "Training endpoint updated to: ${IMAGE}"
