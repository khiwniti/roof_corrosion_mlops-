name: CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to RunPod?'
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: khiwnitigetintheq/roof-corrosion-inference

jobs:
  # ── Build & Push Docker Image ────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/runpod/serverless/inference/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to RunPod Serverless ──────────────────────────
  deploy-runpod:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to RunPod
        run: |
          curl -s -X POST "https://rest.runpod.io/v2/endpoints/${{ vars.RUNPOD_ENDPOINT_ID }}/update" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "imageName": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            }'
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}

      - name: Verify deployment
        run: |
          sleep 30
          curl -s -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            "https://rest.runpod.io/v2/endpoints/${{ vars.RUNPOD_ENDPOINT_ID }}" | jq '.imageName'
