name: PR - Docker Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/runpod/serverless/inference/**'
      - 'services/api/app/**'
      - '.github/workflows/**'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/runpod/serverless/inference/Dockerfile
          platforms: linux/amd64
          push: false
          tags: roof-corrosion-inference:pr-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image imports
        run: |
          docker run --rm \
            -e REGION=TH \
            -e PIPELINE=fm \
            -e PYTHONPATH=/app/src \
            roof-corrosion-inference:pr-test \
            python3 -c "import app.inference.pipeline_fm; print('FM pipeline imports OK')"
