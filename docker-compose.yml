# Local MLOps development stack
# Usage: docker compose up -d

services:
  # ── MLflow tracking server ────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres-mlflow:5432/mlflow
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://mlflow-artifacts/local
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_REGION=us-east-1
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres-mlflow:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/local
      --host 0.0.0.0
      --port 5000
    depends_on:
      - postgres-mlflow
      - minio
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

  postgres-mlflow:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres-mlflow-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # ── MinIO (S3-compatible storage) ─────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/mlflow-artifacts;
      mc mb --ignore-existing local/roof-corrosion-mlops;
      mc mb --ignore-existing local/tile-cache;
      mc mb --ignore-existing local/frozen-test;
      "

  # ── Redis (job queue) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ── Label Studio (HITL labeling) ──────────────────────────
  label-studio:
    image: heartexlabs/label-studio:1.12.0
    ports:
      - "8080:8080"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/data
    volumes:
      - label-studio-data:/label-studio/data
      - ./data:/data:ro  # mount local data for labeling

  # ── Prefect server ────────────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:2-python3.11
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@postgres-prefect:5432/prefect
    depends_on:
      - postgres-prefect

  postgres-prefect:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres-prefect-data:/var/lib/postgresql/data

  # ── Evidently monitoring ──────────────────────────────────
  evidently:
    image: ghcr.io/evidentlyai/evidently:latest
    ports:
      - "8001:8000"
    volumes:
      - evidently-data:/app/data

  # ── Prometheus + Grafana ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana

  # ── FastAPI (local dev) ───────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile.runpod
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://redis:6379/0
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_BUCKET=roof-corrosion-mlops
    depends_on:
      - redis
      - mlflow
    volumes:
      - ./services/api/app:/app/app:ro

volumes:
  postgres-mlflow-data:
  postgres-prefect-data:
  minio-data:
  redis-data:
  label-studio-data:
  evidently-data:
  prometheus-data:
  grafana-data:
  mlflow-artifacts:
