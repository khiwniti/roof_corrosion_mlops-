# RunPod API pod configuration
# Deploys the FastAPI inference service

pod_name: roof-corrosion-api
image: roof-corrosion-api:latest
gpu_type: NVIDIA_A10  # 24GB VRAM, sufficient for SegFormer-B2 + Mask2Former
gpu_count: 1
vcpu_count: 4
memory_in_gb: 16

# Persistent volume for model cache
volumes:
  - name: model-cache
    mount_path: /app/models
    size_gb: 50

# Environment
env:
  - name: MLFLOW_TRACKING_URI
    value: http://mlops-pod:5000
  - name: REDIS_URL
    value: redis://redis:6379/0

# Health check
health_check:
  http_get:
    path: /health
    port: 8000
  initial_delay_seconds: 30
  period_seconds: 10

# Autoscaling (serverless)
# Uncomment for burst traffic handling
# autoscaling:
#   min_replicas: 1
#   max_replicas: 5
#   target_concurrent_requests: 10
