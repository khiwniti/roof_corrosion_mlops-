# RunPod API pod configuration — Production
# Deploys the FastAPI inference service as a persistent pod
# (use serverless endpoint for auto-scaling; this is for dedicated/always-on)
pod_name: roof-corrosion-api
image: docker.io/khiwnitigetintheq/roof-corrosion-api:latest
gpu_type: NVIDIA RTX A4000  # 16GB VRAM, sufficient for SegFormer-B2 + SAM2 fallback
gpu_count: 1
vcpu_count: 4
memory_in_gb: 16
# Persistent volume for model cache
volumes:
  - name: model-cache
    mount_path: /app/models
    size_gb: 50
# Environment
env:
  - name: REGION
    value: "TH"
  - name: PIPELINE
    value: "fm"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: MIN_CONFIDENCE
    value: "0.6"
  - name: LOG_LEVEL
    value: "INFO"
  - name: MLFLOW_TRACKING_URI
    value: "http://mlops-pod:5000"
  - name: REDIS_URL
    value: "redis://redis:6379/0"
# Health check
health_check:
  http_get:
    path: /health
    port: 8000
  initial_delay_seconds: 30
  period_seconds: 10
