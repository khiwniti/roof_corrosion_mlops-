# RunPod MLOps control plane pod
# Self-hosted MLflow, Label Studio, Prefect, Evidently

pod_name: roof-corrosion-mlops
image: roof-corrosion-mlops:latest
gpu_type: NONE  # CPU-only for MLOps services
vcpu_count: 4
memory_in_gb: 16

volumes:
  - name: mlflow-artifacts
    mount_path: /app/mlflow/artifacts
    size_gb: 100
  - name: dvc-cache
    mount_path: /app/data/dvc-cache
    size_gb: 200

# Services running in this pod:
# - MLflow tracking server (port 5000)
# - Label Studio (port 8080)
# - Prefect server (port 4200)
# - Evidently monitoring (port 8001)
# - Redis (port 6379)
